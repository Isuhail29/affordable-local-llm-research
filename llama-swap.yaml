# AI Hub switchboard config (llama-swap). One API at http://127.0.0.1:9292/v1
# Every model below auto-starts on first request and swaps out when another is asked for.
# All configs are the lab's measured-optimal recipes (see experiments/).
# Sampler flags are each model maker's recommended settings (E042): free quality, zero speed cost.
#   Qwen3 instruct/coder/vl:  --temp 0.7 --top-p 0.8 --top-k 20 --min-p 0
